name: Build and Create Release Draft

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:


  build-linux:
    name: Build on Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add PipeWire PPA
        run: sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential cmake libx11-dev libpipewire-0.3-dev libxi-dev libwnck-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev libpulse-dev

      - name: Compile Audiopad
        run: |
          mkdir build
          cd build
          cmake ..
          cmake --build . --config Release

      - name: Build debian package
        run: |
          cd build
          make install DESTDIR=../deployment/debian/audiopad
          cd ../deployment/debian
          dpkg-deb --build audiopad

      - name: Upload deb package
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: deployment/debian/audiopad.deb



  build-source:
    name: Package Source Code
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: audiopad

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential cmake libx11-dev libpipewire-0.3-dev ninja-build libxi-dev libwnck-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev libpulse-dev

      - name: Fetch Required External Dependencies
        run: |
          cd audiopad
          cmake -GNinja .
          find build -not -name "_deps" -delete
          rm -f CMakeCache.txt

      - name: Create source tarball
        uses: master-atul/tar-action@v1.0.2
        with:
          command: c
          files: |
            ./audiopad
          outPath: audiopad.tar.gz

      - name: Upload Source Tarball
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: audiopad.tar.gz

  create-release:
    name: Create GitHub Release Draft
    runs-on: ubuntu-latest
    needs: [build-linux, build-source]
    permissions:
      contents: write
    steps:


      - name: Download Linux Deb
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: ./download/linux-deb



      - name: Download Source Tarball
        uses: actions/download-artifact@v4
        with:
          name: source-tarball
          path: ./download/source-tarball

      - name: Determine Version Tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=manual-build-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare and Rename Binaries
        run: |
          mkdir release
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          mv "./download/linux-deb/audiopad.deb" "./release/audiopad-${TAG_NAME}.deb"
          mv "./download/source-tarball/audiopad.tar.gz" "./release/audiopad-${TAG_NAME}.tar.gz"



      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Release ${{ steps.tag.outputs.tag_name }}
          draft: true
          prerelease: false
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
